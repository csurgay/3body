<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3body</title>
    <script src="script.js"></script>
</head>
<body onload="main()">
    <div style="float: left">
        <canvas id="canvas" width="1000" height="900"></canvas>
    </div>
    <div id="column" margin-left="20px" style="float: left;">
        <fieldset>
            <legend>Number of Bodies</legend>
            <input type="number" id="bodies" step="1" value="3">
        </fieldset>
        <fieldset>
            <legend>Masses of Bodies</legend>
            <div id="B1" style='background-color:#888888;'>&nbsp;B1: <input type="number" id="b1" step="1" value="1"><br/></div>
            <div id="B2" style='background-color:#888888;'>&nbsp;B2: <input type="number" id="b2" step="1" value="1"><br/></div>
            <div id="B3" style='background-color:#888888;'>&nbsp;B3: <input type="number" id="b3" step="1" value="1"><br/></div>
            <div id="B4" style='background-color:#888888;'>&nbsp;B4: <input type="number" id="b4" step="1" value="1"><br/></div>
            <div id="B5" style='background-color:#888888;'>&nbsp;B5: <input type="number" id="b5" step="1" value="1"><br/></div>
            <div id="B6" style='background-color:#888888;'>&nbsp;B6: <input type="number" id="b6" step="1" value="1"><br/></div>
            <div id="B7" style='background-color:#888888;'>&nbsp;B7: <input type="number" id="b7" step="1" value="1"><br/></div>
            <div id="B8" style='background-color:#888888;'>&nbsp;B8: <input type="number" id="b8" step="1" value="1"><br/></div>
        </fieldset>
        <fieldset>
            <legend>Controls</legend>
            <button onclick="init(); document.activeElement?.blur?.();">Restart</button>
            <button onclick="pause(); document.activeElement?.blur?.();">Pause</button>
            <button onclick="orbital(); document.activeElement?.blur?.();">Orbital</button>
        </fieldset>
        <fieldset>
            <legend>Animation Speed</legend>
            <input type="number" id="speed" step="1" value="1">
        </fieldset>
        <fieldset>
            <legend>Past track length</legend>
            <input type="range" id="track" min="30" max="1000" value="100">
        </fieldset>
        <fieldset>
            <legend>Future track length</legend>
            <input type="range" id="future" min="30" max="1000" value="100">
        </fieldset>
        <fieldset>
            <legend>Motion vector length</legend>
            <input type="range" id="vector" min="10" max="200" value="30">
        </fieldset>
    </div>
</body>
</html>
